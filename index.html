<script>
  function scaleCartel() {
    var el = document.querySelector('#root > div');
    if (!el) return;
    var maxW = 1100;
    var winW = window.innerWidth;
    var scale = winW >= maxW ? 1 : winW / maxW;
    el.style.transform = scale < 1 ? 'scale(' + scale + ')' : '';
    el.style.transformOrigin = 'top center';
    var wrapper = el.parentElement;
    if (scale < 1) {
      wrapper.style.height = (el.getBoundingClientRect().height / scale * scale + 48) + 'px';
      wrapper.style.overflow = 'hidden';
    } else {
      wrapper.style.height = '';
      wrapper.style.overflow = '';
    }
  }
  window.addEventListener('load', function(){ setTimeout(scaleCartel,300); setTimeout(scaleCartel,1200); });
  window.addEventListener('resize', scaleCartel);
</script>
