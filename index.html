// ── TWEAKS PANEL ─────────────────────────────────────────────────────────────
function useTweaks(defaults) {
  const [t, setT] = React.useState(defaults);
  function setTweak(k, v) { setT(function(prev){ var n={}; Object.assign(n,prev); n[k]=v; return n; }); }
  return [t, setTweak];
}

function TweaksPanel({ children }) {
  return (
    <div style={{position:'fixed',bottom:16,right:16,background:'rgba(10,10,10,0.92)',border:'1px solid #333',borderRadius:8,padding:'12px 16px',zIndex:9999,fontFamily:'sans-serif',fontSize:12,color:'#ccc',minWidth:200,backdropFilter:'blur(6px)'}}>
      <div style={{fontWeight:700,letterSpacing:'0.1em',marginBottom:10,color:'#fff',fontSize:11,textTransform:'uppercase'}}>⚙ Ajustes</div>
      {children}
    </div>
  );
}

function TweakSection({ title }) {
  return <div style={{marginTop:10,marginBottom:4,fontWeight:700,color:'#aaa',fontSize:10,letterSpacing:'0.15em',textTransform:'uppercase'}}>{title}</div>;
}

function TweakRadio({ id, value, onChange, options }) {
  return (
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      {options.map(function(o){
        var active = value === o.value;
        return (
          <button key={o.value} onClick={function(){ onChange(o.value); }}
            style={{padding:'3px 10px',borderRadius:4,border:'1px solid '+(active?'#c8922a':'#444'),background:active?'#c8922a':'transparent',color:active?'#000':'#ccc',cursor:'pointer',fontSize:11,fontFamily:'sans-serif'}}>
            {o.label}
          </button>
        );
      })}
    </div>
  );
}
</script>

// ── SERVICES TICKER ─────────────────────────────────────────────────────────
function Ticker({ items, bg, textColor, dotColor, size=17, padding='9px 28px' }) {
  const renderItems = (keySuffix) => items.map((item,i)=>(
    <span key={i+keySuffix} style={{fontSize: item==='·'?size*0.65:size, color: item==='·'?dotColor:textColor, letterSpacing:'0.18em', padding:'0 10px', opacity: item==='·'?0.5:1, flexShrink:0, whiteSpace:'nowrap'}}>{item}</span>
  ));
  return (
    <div style={{background:bg, overflow:'hidden', paddingTop:'13px', paddingBottom:'13px'}}>
      <style>{`@keyframes mq { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }`}</style>
      <div style={{display:'flex', width:'max-content', animation:'mq 28s linear infinite'}}>
        {renderItems('a')}
        {renderItems('b')}
      </div>
    </div>
  );
}

// ── LAYOUT VERTICAL ─────────────────────────────────────────────────────────
function LayoutVertical({ p, TreeComp }) {
  React.useEffect(() => {
    function fit() {
      const container = document.getElementById('vertikaltop');
      const los = document.getElementById('losrastros');
      const dej = document.getElementById('dejupiter');
      const upm = document.getElementById('ultramarinos');
      const anv = document.getElementById('aniversariolinea');
      if (!container || !los) return;
      const targetW = container.getBoundingClientRect().width;
      [los, dej, upm, anv].forEach(function(el) {
        if (!el) return;
        el.style.transform = 'none';
        const w = el.getBoundingClientRect().width;
        if (w > 0) el.style.transform = 'scaleX(' + (targetW / w) + ')';
      });
      var foot = document.getElementById('footerlinea');
      var footCont = document.getElementById('footercontainer');
      if (foot && footCont) {
        foot.style.transform = 'none';
        var footW = foot.getBoundingClientRect().width;
        var footContW = footCont.getBoundingClientRect().width - 80;
        if (footW > 0) foot.style.transform = 'scaleX(' + (footContW / footW) + ')';
      }
    }
    const timer = setTimeout(fit, 80);
    window.addEventListener('resize', fit);
    return function() { clearTimeout(timer); window.removeEventListener('resize', fit); };
  }, []);

// ── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const p = PALETTES[t.palette] || PALETTES.verde;
  const TreeComp = t.tree === 'lineal' ? TreeLineal : t.tree === 'cosmico' ? TreeCosmico : TreeGeometrico;

  return (
    <React.Fragment>
      {t.layout === 'clasico'  && <LayoutClasico  p={p} TreeComp={TreeComp}/>}
      {t.layout === 'moderno'  && <LayoutModerno  p={p} TreeComp={TreeComp}/>}
      {t.layout === 'vertical' && <LayoutVertical p={p} TreeComp={TreeComp}/>}

    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

<script>
  function scaleCartel() {
    var el = document.querySelector('#root > div');
    if (!el) return;
    var wrapper = el.parentElement;
    var maxW = 1100;
    var winW = Math.min(window.innerWidth, window.screen.width);
    var scale = winW >= maxW ? 1 : winW / maxW;
    el.style.transform = scale < 1 ? 'scale(' + scale + ')' : '';
    el.style.transformOrigin = 'top center';
    // Adjust wrapper height so it doesn't leave gap below
    if (scale < 1) {
      var naturalH = el.getBoundingClientRect().height / scale;
      wrapper.style.height = (naturalH * scale + 48) + 'px';
      wrapper.style.overflow = 'hidden';
    } else {
      wrapper.style.height = '';
      wrapper.style.overflow = '';
    }
  }
  window.addEventListener('load', function() {
    setTimeout(scaleCartel, 200);
    setTimeout(scaleCartel, 800);
  });
  window.addEventListener('resize', scaleCartel);
</script>
